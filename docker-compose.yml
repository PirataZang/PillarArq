version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ${PROJECT_NAME:-pillararq}_backend

    restart: unless-stopped

    ports:
      - "${PORT:-3333}:3333"

    volumes:
      - ./backend:/app
      - /app/node_modules

    stdin_open: true
    tty: true

    environment:
      - NODE_ENV
      - PORT
      - HOST
      - LOG_LEVEL
      - APP_KEY
      - JWT_SECRET
      - DB_HOST
      - DB_PORT
      - DB_USER
      - DB_PASSWORD
      - DB_DATABASE
      - REDIS_HOST
      - REDIS_PORT

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - pillar_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ${PROJECT_NAME:-pillararq}_frontend

    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-5173}:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    stdin_open: true
    tty: true

    environment:
      - NODE_ENV
      - CHOKIDAR_USEPOLLING=true
      - VITE_APP_NAME=${PROJECT_NAME:-PillarARQ}
      - VITE_API_URL=/api/v1
      - VITE_API_PROXY_TARGET=http://backend:3333

    depends_on:
      - backend

    networks:
      - pillar_network

  postgres:
    image: postgres:16-alpine

    container_name: ${PROJECT_NAME:-pillararq}_postgres

    restart: unless-stopped

    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}

    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - pillar_network

  redis:
    image: redis:7-alpine

    container_name: ${PROJECT_NAME:-pillararq}_redis

    restart: unless-stopped

    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - pillar_network

volumes:
  postgres_data:
  redis_data:

networks:
  pillar_network:
    driver: bridge